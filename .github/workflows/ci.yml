name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# All jobs run inside the Nix flake devshell (hermetic: zig 0.15.2, pkg-config,
# openssl/libcrypto, static libzstd, ziglint, just, apache-kafka, mkcert). This
# matches local dev exactly and sidesteps the libc/libzstd/libcrypto
# portability friction of a bare Ubuntu/macOS matrix. Linux-only: a macOS
# matrix isn't valuable for this repo and nix-darwin adds CI time without
# signal (the devshell is the same).
jobs:
  # ztls is a path dep at ../ztls. actions/checkout@v4 forbids paths outside
  # $GITHUB_WORKSPACE, so check ztls out into _ztls (inside the workspace) and
  # symlink it to ../ztls so build.zig.zon's path dep resolves unchanged.
  # TODO: drop this once mattrobenolt/ztls#66 lands and build.zig.zon switches
  # to the published ztls tarball.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: mattrobenolt/ztls
          path: _ztls
      - name: Symlink ztls to ../ztls
        run: ln -s "$PWD/_ztls" "$PWD/../ztls"
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v9
      - run: nix develop -c zig build test --summary all

  test-zstd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: mattrobenolt/ztls
          path: _ztls
      - name: Symlink ztls to ../ztls
        run: ln -s "$PWD/_ztls" "$PWD/../ztls"
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v9
      - run: nix develop -c zig build -Dzstd=true test --summary all

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v9
      - run: nix develop -c bash -c "git ls-files -z '*.zig' | xargs -0 zig fmt --check"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v9
      - run: nix develop -c ziglint

  # e2e (just e2e) starts a real Kafka broker — heavy and stateful. Run it
  # manually on a dev machine via `just e2e`, not in CI.
  #
  # Fuzz: the repo uses std.testing.fuzz with committed corpora, which run as
  # part of `zig build test` above. A persistent --fuzz job (long-running,
  # time-budgeted) isn't a pass/fail CI gate.
